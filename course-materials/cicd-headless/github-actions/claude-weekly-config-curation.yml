name: Weekly Claude Config Curation

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run weekly audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x ./course-materials/03-2026/cicd-headless/scripts/weekly_claude_config_audit.sh
          ./course-materials/03-2026/cicd-headless/scripts/weekly_claude_config_audit.sh

      - name: Create pull request with curated config
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/weekly-claude-config-curation
          title: "chore: weekly Claude config curation"
          commit-message: "chore: weekly Claude config curation"
          body: |
            Automated weekly maintenance of:
            - CLAUDE.md / AGENTS.md
            - .claude/rules/*
            - .claude/skills/*
            - .claude/settings.json
            - .mcp.json

            Generated by Claude Code in CI.
          add-paths: |
            CLAUDE.md
            AGENTS.md
            .mcp.json
            .claude/**
            CLAUDE_CONFIG_AUDIT.md
